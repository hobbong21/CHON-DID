name: Backend CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  JAVA_VERSION: '21'
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 177559565474.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_NAME: chon-backend
  ECS_CLUSTER: chon-cluster
  ECS_SERVICE: chon-dev-svc

permissions:
  id-token: write
  contents: read

jobs:
  compile:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -q -DskipTests compile

      - name: Run tests
        run: mvn -q test
        continue-on-error: true

  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: compile
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=${{ github.ref_name }}
          echo "sha_tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev (ECS)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment stability
        continue-on-error: true
        run: |
          echo "Waiting for ECS service to stabilize (app takes ~3 min to start)..."
          for i in $(seq 1 30); do
            STATUS=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].deployments | length(@)' \
              --output text)
            if [ "$STATUS" = "1" ]; then
              echo "Deployment complete! Service stable with 1 deployment."
              exit 0
            fi
            echo "  Attempt $i/30 — $STATUS deployments active, waiting 30s..."
            sleep 30
          done
          echo "Deployment triggered but did not stabilize within 15 minutes. Check ECS console."
