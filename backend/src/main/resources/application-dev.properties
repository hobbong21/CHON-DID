#################
### COMMON CONFIG
#################
dev.mode=true
server.port=8888
server.servlet.context-path=/mcrs-api
server.servlet.session.persistent=false
spring.main.allow-circular-references=true




#################
### LOGS CONFIG
#################
logging.file.name=${LOG_FILE_PATH:chon-logs.log}
logging.pattern.console=%d{dd/MM/yyyy HH:mm:ss.SSS} %-5level [%thread] %logger{115} - %msg%n
logging.level.org.springdoc=DEBUG

#################
### ACTUATOR (health check for ALB)
#################
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never




#################
### config DB
#################
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/chondb}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver



#################
### HikariCP settings
#################
spring.datasource.hikari.poolName=chonDB
spring.datasource.hikari.connectionTimeout=60000
spring.datasource.hikari.idleTimeout=300000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=20




#################
### JPA settings
#################
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
#spring.jpa.hibernate.use-new-id-generator-mappings=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect


#################
### Authentication settings
#################
JWT_SECRET=change-me-in-production-minimum-32-chars
jwt.access.validity =3600
jwt.refresh.validity = 1800
jwt.check.validity=3600
rsa.public.key=${RSA_PUBLIC_KEY:}
rsa.private.key=${RSA_PRIVATE_KEY:}



###################################
### encyption
###################################
encrypt.key=${ENCRYPT_KEY:}



###################################
### mail
###################################
schedule.send.mail=false
mail.host=smtp.yandex.com
mail.port=465
mail.user=${MAIL_USER:}
mail.password=${MAIL_PASSWORD:}




# ===============================
# cau hinh duong dan de gen link
# ===============================
base-url.view-image=${BASE_URL_VIEW_IMAGE:http://localhost:8888/mcrs-api/public/image}




max-verify-point=10000
verify-point=10000
base-url.share-link=${BASE_URL_SHARE_LINK:https://app.chon.ai/mcrs-api/share/verify-link}
base-url.share-link-event=${BASE_URL_SHARE_LINK_EVENT:https://app.chon.ai/mcrs-api/event/event-link}
app-key=${APP_KEY:chonselfid}
url.store.android=${URL_STORE_ANDROID:}
url.store.ios=${URL_STORE_IOS:}


# ===============================
# Swagger
# ===============================
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs





# ===============================
# image service
# ===============================
root-folder-image=${ROOT_FOLDER_IMAGE:/tmp/chon-image}
max-file-size-mb=30
# ===============================



url.origin=${URL_ORIGIN:http://localhost:4200,http://localhost:8080,http://localhost:3030}
oauth2.ignore-urls=/auth/login,/auth/login/2fa,/auth/refresh,/auth/logout,/auth/register/**,/auth/password/reset/**,/clan/create,/public/**,/share/verify-link,/event/web/**,/event/event-link,/category/list,/identifier/create/card,/taekwondo/create/taekwondo,/verify/integration-did,/actuator/health,/invite.html


###################################
### SMS (Naver Cloud SENS)
###################################
sms.enabled=${SMS_ENABLED:false}
sms.naver.service-id=${SENS_SERVICE_ID:}
sms.naver.access-key=${SENS_ACCESS_KEY:}
sms.naver.secret-key=${SENS_SECRET_KEY:}
sms.naver.sender-phone=${SENS_SENDER_PHONE:}

#=============================
# DID
#=============================
issuer.did.base-url=${ISSUER_DID_BASE_URL:}
issuer.did.token=${ISSUER_DID_TOKEN:}
issuer.did.id=${ISSUER_DID_ID:}
